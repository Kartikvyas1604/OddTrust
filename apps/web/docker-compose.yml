services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: oddtrust
      POSTGRES_USER: oddtrust
      POSTGRES_PASSWORD: oddtrust_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U oddtrust"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  web:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      HOST: 0.0.0.0
      DATABASE_URL: postgres://oddtrust:oddtrust_dev@postgres:5432/oddtrust
      REDIS_URL: redis://redis:6379
      TXLINE_CLIENT_ID: ${TXLINE_CLIENT_ID}
      TXLINE_WALLET_KEY: ${TXLINE_WALLET_KEY}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  ws-server:
    build:
      context: ../..
      dockerfile: apps/web/Dockerfile.ws
    ports:
      - "3002:3002"
    environment:
      WS_PORT: 3002
      REDIS_URL: redis://redis:6379
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: "false"
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: ../..
      dockerfile: apps/backend/Dockerfile
    environment:
      NODE_ENV: production
      DATABASE_URL: postgres://oddtrust:oddtrust_dev@postgres:5432/oddtrust
      REDIS_URL: redis://redis:6379
      TXLINE_API_BASE: ${TXLINE_API_BASE:-https://api.txline.txodds.com/v1}
      TXLINE_WS_URL: ${TXLINE_WS_URL:-wss://stream.txline.txodds.com/v1}
      TXLINE_CLIENT_ID: ${TXLINE_CLIENT_ID}
      TXLINE_WALLET_KEY: ${TXLINE_WALLET_KEY}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      SOLANA_ORACLE_PROGRAM_ID: ${SOLANA_ORACLE_PROGRAM_ID:-}
      SOLANA_PAYER_KEY: ${SOLANA_PAYER_KEY:-}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      LOG_PRETTY: "false"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
